name = "bicameral-telemetry-relay"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Set your PostHog key as a secret (never committed):
#   wrangler secret put POSTHOG_API_KEY
#
# Optional: override the PostHog host (e.g. for EU region):
#   wrangler secret put POSTHOG_HOST   # value: https://eu.posthog.com

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
# Fill in after: wrangler kv:namespace create RATE_LIMIT_KV
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Custom domain (add after first deploy):
# [[routes]]
# pattern = "telemetry.bicameral-ai.com/event"
# zone_name = "bicameral-ai.com"
