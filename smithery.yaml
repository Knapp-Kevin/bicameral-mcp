startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - repoPath
    properties:
      repoPath:
        type: string
        description: Absolute path to the repository to analyze
      surrealUrl:
        type: string
        description: "SurrealDB URL (default: surrealkv://~/.bicameral/ledger.db)"
  commandFunction: |-
    (config) => ({
      command: 'uvx',
      args: ['bicameral-mcp'],
      env: {
        REPO_PATH: config.repoPath,
        ...(config.surrealUrl ? { SURREAL_URL: config.surrealUrl } : {})
      }
    })
